<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Bharosa logo">
  <defs>
    <linearGradient id="bharosa-shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F4D3F"/>
      <stop offset="100%" stop-color="#1B5C4D"/>
    </linearGradient>
  </defs>
  <!-- Cream backdrop circle so the shield reads on dark surfaces too. -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#FBF6EB"/>
  <!-- Shield silhouette (defense layer). -->
  <path d="M32 8 L52 16 V32 C52 44 42.5 53 32 56 C21.5 53 12 44 12 32 V16 Z" fill="url(#bharosa-shield)"/>
  <!-- Checkmark (trust + everything's-OK). -->
  <path d="M22 32 L29 39 L42 24" fill="none" stroke="#C8973F" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Devanagari "भ" placed subtle at bottom — TODO replace SVG when the user delivers the brand PNG. -->
  <text x="32" y="50" font-family="Mukta, sans-serif" font-size="9" font-weight="700" text-anchor="middle" fill="#FBF6EB" opacity="0.85">भ</text>
</svg>
